<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyCompta | Grand Livre Premium</title>
    <link rel='stylesheet' type='text/css' media='screen' href='gr.css'>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @media print {
            body { background: white !important; color: black !important; }
            .barre-laterale, .barre-actions, .boite-recherche { display: none !important; }
            .conteneur-application { width: 100%; border: none !important; box-shadow: none !important; }
            .compte-t { border: 1px solid black !important; break-inside: avoid; margin-bottom: 30px; }
            .entete-t { border-bottom: 2px solid black !important; color: black !important; }
            .carte-resume { visibility: visible; background-color: white !important; color: #333 !important; box-shadow: none !important; }
        }
        .boutons-modal { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="conteneur-application">
        <aside class="barre-laterale">
            <div class="marque">PY COMPTA</div>
            <button class="bouton-hamburger" id="hamburgerBtn">
                ☰ 
            </button>
            <nav class="menu-navigation">
                <a href="taffe.html" class="element-navigation"><i class="fas fa-chart-pie"></i> Tableau de bord</a>
                <a href="Factclient.html" class="element-navigation"><i class="fas fa-user-tie"></i> Factures Clients</a>
                <a href="fact.html" class="element-navigation"><i class="fas fa-truck"></i> Fournisseurs</a>
                <a href="Jour.html" class="element-navigation"><i class="fas fa-book-open"></i> Journaux</a>
                <a href="gr.html" class="element-navigation actif"><i class="fas fa-layer-group"></i> Grand Livre</a>
                <a href="balance.html" class="element-navigation"><i class="fas fa-scale-balanced"></i> Balance</a>
                <a href="bil.html" class="element-navigation">  <i class="fas fa-landmark"></i> Bilan Annuel</a>
                <a href="par.html" class="element-navigation bouton-parametres"><i class="fas fa-gears"></i> Paramètres</a>
            </nav>
        </aside>

        <main class="contenu-principal">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1>GRAND LIVRE GÉNÉRAL</h1>
                <div class="boite-recherche">
                    <i class="fas fa-search" style="margin-right:10px; opacity:0.5;"></i>
                    <input type="text" id="searchAccount" onkeyup="filterAccounts()" placeholder="Chercher un compte..." style="background:transparent; border:none; color:white; outline:none; width:100%;">
                </div>
            </div>

            <div style="margin-bottom: 30px;">
                <button class="carte-resume" onclick="window.print()" style="cursor:pointer; color:white; font-weight:800; width:auto; padding: 10px 20px; box-shadow: inset 4px 0 0 var(--accent-blue);">
                    <i class="fas fa-print"></i> IMPRIMER PDF
                </button>
            </div>

            <div class="ruban-resume">
                <div class="carte-resume" style="background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(59, 130, 246, 0.05)); border-left: 4px solid var(--neon-blue); transition: 0.3s; box-shadow: inset 4px 0 0 var(--accent-blue)">
                    <small>Total Débits</small>
                    <div id="totalDebits">0 FC</div>
                </div>
                <div class="carte-resume" style="background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(139, 92, 246, 0.05)); border-left: 4px solid var(--neon-pink); transition: 0.3s; box-shadow: inset 4px 0 0 #8b5cf6">
                    <small>Total Crédits</small>
                    <div id="totalCredits">0 FC</div>
                </div>
                <div class="carte-resume" style="transition: 0.2s; animation: clign 4s infinite alternate; background: white; color: #333; box-shadow: inset 4px 0 0 #f472b6;">
                    <small style="color: #666; animation: clign 4s infinite alternate;">Équilibre (D-C)</small>
                    <div id="totalSolde">0 FC</div>
                </div>
            </div>

            <div class="grille-grand-livre" id="ledgerContainer"></div>
        </main>
    </div>

    <div id="invoiceModal" class="superposition-modale" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); z-index:1000; align-items:center; justify-content:center;">
        <div class="conteneur" style="max-width:600px; width:90%; position:relative; animation: bor 1s infinite alternate; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding:30px; border-radius:20px;">
             
            <button onclick="closeModal()" style="position:absolute; right:20px; top:20px; background:none; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>
            <div id="modalContent"></div>
            <div class="boutons-modal">
                <button class="bouton-smash" onclick="window.location.href='jour.html'"><i class="fas fa-edit"></i>Modifier</button>
            </div>
        </div>
    </div>
    
    <script src="gr.js"></script>
</body>
</html>
